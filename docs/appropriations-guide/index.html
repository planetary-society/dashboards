<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FY 2027 Appropriations Request Guide - The Planetary Society</title>
    <meta name="description" content="Find your representative and get step-by-step instructions for filling out congressional appropriations request forms supporting NASA Science, NSF, and DOE Office of Science.">
    <meta name="author" content="Casey Dreier/The Planetary Society">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#037cc2">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://dashboards.planetary.org/appropriations-guide/">

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://www.planetary.org/img/site/apple-touch-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://www.planetary.org/img/site/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://www.planetary.org/img/site/favicon-16x16.png">
    <link rel="shortcut icon" href="https://www.planetary.org/img/site/favicon.ico">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Tom Select CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">

    <!-- Shared CSS -->
    <link rel="stylesheet" href="../shared/css/variables.css">
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/components.css">
    <link rel="stylesheet" href="../shared/css/layout.css">

    <style>
        .guide-hero {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            padding: var(--space-8) var(--space-4) var(--space-4);
        }

        .guide-hero h2 {
            margin-bottom: var(--space-3);
        }

        .guide-hero p {
            color: var(--gray-600);
            line-height: var(--line-height-relaxed);
        }

        .selector-section {
            max-width: 800px;
            margin: 0 auto;
            padding: var(--space-4);
        }

        .selector-row {
            display: flex;
            gap: var(--space-4);
        }

        .selector-field {
            flex: 1;
        }

        .selector-field label {
            font-weight: var(--font-weight-medium);
            margin-bottom: var(--space-1);
            display: block;
            font-size: var(--text-sm);
            color: var(--gray-600);
        }

        .member-header {
            max-width: 800px;
            margin: 0 auto;
            padding: var(--space-4);
            background: var(--color-surface);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
        }

        .member-header h2 {
            font-size: var(--text-xl);
            margin-bottom: var(--space-2);
        }

        .deadline {
            color: var(--gray-600);
            font-size: var(--text-sm);
            margin-bottom: var(--space-3);
        }

        .form-button {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            background: var(--blue-500);
            color: white;
            padding: var(--space-3) var(--space-5);
            border-radius: var(--border-radius);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: background var(--duration-normal) var(--ease-out),
                        transform var(--duration-normal) var(--ease-out),
                        box-shadow var(--duration-normal) var(--ease-out);
        }

        .form-button:hover {
            background: var(--blue-600);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .form-button--email {
            background: var(--purple-500);
        }

        .form-button--email:hover {
            background: var(--purple-600);
        }

        .warning-banner {
            background: var(--orange-50);
            border-left: 4px solid var(--orange-500);
            padding: var(--space-3) var(--space-4);
            border-radius: var(--border-radius-sm);
            color: var(--gray-700);
            margin-bottom: var(--space-3);
        }

        .warning-banner--subtle {
            background: var(--gray-50);
            border-left-color: var(--gray-400);
        }

        .warning-banner i {
            margin-right: var(--space-2);
        }

        .warning-banner a {
            color: var(--blue-500);
        }

        @media (max-width: 768px) {
            .selector-row {
                flex-direction: column;
            }

            .guide-hero {
                padding: var(--space-4) var(--space-3) var(--space-2);
            }
        }

        /* Spending Context Panel */
        #spending-context {
            max-width: 800px;
            margin: var(--space-4) auto;
            padding: var(--space-4);
            background: var(--color-surface);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
        }

        #spending-context h3 {
            font-size: var(--text-lg);
            margin-bottom: var(--space-3);
        }

        .spending-summary {
            color: var(--gray-600);
            font-size: var(--text-sm);
            margin-bottom: var(--space-2);
        }

        .spending-summary .fy-value {
            font-weight: var(--font-weight-medium);
            color: var(--gray-800);
        }

        .separator {
            color: var(--gray-400);
            margin: 0 var(--space-1);
        }

        .award-counts {
            font-size: var(--text-sm);
            color: var(--gray-600);
            margin-bottom: var(--space-4);
            font-weight: var(--font-weight-medium);
        }

        .award-list {
            border-top: 1px solid var(--gray-200);
        }

        .award-row {
            padding: var(--space-3) 0;
            border-bottom: 1px solid var(--gray-100);
            cursor: pointer;
            transition: background var(--duration-fast) var(--ease-out);
        }

        .award-row:hover {
            background: var(--gray-50);
        }

        .award-row-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-1);
        }

        .award-type-badge {
            font-size: var(--text-xs);
            font-weight: var(--font-weight-medium);
            padding: 2px 8px;
            border-radius: var(--border-radius-full);
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wide);
        }

        .award-type-badge--contract {
            background: var(--blue-100);
            color: var(--blue-700);
        }

        .award-type-badge--grant {
            background: var(--purple-100);
            color: var(--purple-700);
        }

        .award-recipient {
            font-weight: var(--font-weight-medium);
            color: var(--gray-800);
        }

        .award-location {
            color: var(--gray-500);
            font-size: var(--text-sm);
        }

        .award-amount {
            font-weight: var(--font-weight-medium);
            color: var(--gray-900);
            margin-left: auto;
        }

        .award-summary {
            font-size: var(--text-sm);
            color: var(--gray-600);
            line-height: var(--line-height-relaxed);
        }

        .award-details {
            display: none;
            margin-top: var(--space-3);
            padding-top: var(--space-3);
            border-top: 1px solid var(--gray-200);
            font-size: var(--text-sm);
            color: var(--gray-700);
        }

        .award-row.expanded .award-details {
            display: block;
        }

        .award-details p {
            margin-bottom: var(--space-2);
        }

        /* Form Walkthrough */
        #guide-content {
            max-width: 800px;
            margin: var(--space-4) auto;
            padding: 0 var(--space-4);
        }

        .form-walkthrough .form-intro {
            margin-bottom: var(--space-6);
            padding: var(--space-4);
            background: var(--blue-50);
            border-radius: var(--border-radius);
        }

        .form-walkthrough .form-intro h3 {
            font-size: var(--text-lg);
            margin-bottom: var(--space-2);
        }

        .form-walkthrough .form-instructions {
            font-size: var(--text-sm);
            color: var(--gray-600);
            line-height: var(--line-height-relaxed);
        }

        .walkthrough-section {
            margin-bottom: var(--space-6);
        }

        .walkthrough-section h3 {
            font-size: var(--text-lg);
            padding-bottom: var(--space-2);
            border-bottom: 2px solid var(--blue-500);
            margin-bottom: var(--space-4);
        }

        .section-description {
            font-size: var(--text-sm);
            color: var(--gray-600);
            margin-bottom: var(--space-4);
        }

        .guide-field {
            border-left: 3px solid var(--blue-300);
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-3);
            background: var(--color-surface);
            border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;
            box-shadow: var(--shadow-xs);
        }

        .constituent-field {
            border-left-color: var(--gray-300);
            background: var(--gray-50);
        }

        .confidence-low {
            border-left-color: var(--orange-400);
            background: var(--orange-50);
        }

        .field-header {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-2);
            flex-wrap: wrap;
        }

        .field-label {
            font-weight: var(--font-weight-medium);
            color: var(--gray-800);
        }

        .required-badge {
            font-size: var(--text-xs);
            color: var(--red-600);
            font-weight: var(--font-weight-medium);
            padding: 1px 6px;
            border: 1px solid var(--red-200);
            border-radius: var(--border-radius-full);
        }

        .confidence-icon {
            font-size: var(--text-sm);
        }

        .confidence-high {
            color: var(--green-600);
        }

        .confidence-medium {
            color: var(--orange-400);
            font-size: 8px;
        }

        .confidence-low-icon {
            color: var(--orange-500);
        }

        .field-instruction {
            color: var(--gray-700);
            line-height: var(--line-height-relaxed);
        }

        .field-instruction strong {
            color: var(--gray-900);
        }

        .constituent-hint {
            color: var(--gray-500);
            font-style: italic;
        }

        .constituent-hint i {
            margin-right: var(--space-1);
        }

        .field-help {
            display: block;
            font-size: var(--text-sm);
            color: var(--gray-500);
            margin-top: var(--space-1);
        }

        .no-draft {
            color: var(--gray-400);
            font-style: italic;
        }

        .copyable-block {
            position: relative;
            margin-top: var(--space-2);
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--border-radius-sm);
            padding: var(--space-3);
            padding-right: var(--space-10);
        }

        .copyable-block pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: var(--font-family);
            font-size: var(--text-sm);
            line-height: var(--line-height-relaxed);
            margin: 0;
            color: var(--gray-800);
        }

        .copy-btn {
            position: absolute;
            top: var(--space-2);
            right: var(--space-2);
            background: var(--color-surface);
            border: 1px solid var(--gray-300);
            border-radius: var(--border-radius-sm);
            padding: var(--space-1) var(--space-2);
            font-size: var(--text-xs);
            color: var(--gray-600);
            cursor: pointer;
            transition: background var(--duration-fast) var(--ease-out);
        }

        .copy-btn:hover {
            background: var(--gray-100);
        }

        .rationale {
            margin-top: var(--space-2);
        }

        .rationale-toggle {
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            padding: 0;
            font-size: var(--text-sm);
        }

        .rationale-toggle:hover {
            color: var(--blue-500);
        }

        .rationale-text {
            display: none;
            font-size: var(--text-xs);
            color: var(--gray-500);
            margin-top: var(--space-1);
            font-style: italic;
        }

        .rationale.open .rationale-text {
            display: block;
        }

        /* Generic Fallback */
        .generic-guide {
            max-width: 800px;
            margin: 0 auto;
        }

        .generic-intro {
            padding: var(--space-4);
            background: var(--blue-50);
            border-radius: var(--border-radius);
            margin-bottom: var(--space-4);
        }

        .generic-intro p {
            color: var(--gray-700);
            margin: 0;
        }

        .generic-section {
            margin-bottom: var(--space-4);
            border: 1px solid var(--gray-200);
            border-radius: var(--border-radius);
            overflow: hidden;
        }

        .collapsible-header {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-4);
            background: var(--gray-50);
            font-weight: var(--font-weight-medium);
            cursor: pointer;
            list-style: none;
        }

        .collapsible-header::-webkit-details-marker {
            display: none;
        }

        .collapsible-header i {
            transition: transform var(--duration-normal) var(--ease-out);
        }

        details[open] .collapsible-header i {
            transform: rotate(180deg);
        }

        .generic-section-body {
            padding: var(--space-4);
        }

        .generic-section-body h2 {
            font-size: var(--text-lg);
            margin-top: var(--space-4);
            margin-bottom: var(--space-2);
        }

        .generic-section-body h3 {
            font-size: var(--text-base);
            font-weight: var(--font-weight-medium);
            margin-top: var(--space-3);
            margin-bottom: var(--space-1);
        }

        .generic-section-body h4 {
            font-size: var(--text-sm);
            font-weight: var(--font-weight-medium);
            color: var(--gray-700);
            margin-top: var(--space-2);
            margin-bottom: var(--space-1);
        }

        .generic-section-body p {
            line-height: var(--line-height-relaxed);
            margin-bottom: var(--space-2);
        }

        .generic-section-body ul {
            padding-left: var(--space-5);
            margin-bottom: var(--space-2);
        }

        .generic-section-body li {
            margin-bottom: var(--space-1);
        }

        .fill-in {
            background: var(--orange-100);
            padding: 1px 4px;
            border-radius: 2px;
            font-style: italic;
        }

        .fallback-callout {
            background: var(--blue-50);
            border-left: 3px solid var(--blue-500);
            padding: var(--space-3) var(--space-4);
            margin: var(--space-3) 0;
            border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;
            font-style: italic;
            color: var(--gray-600);
        }

        .fallback-callout i {
            margin-right: var(--space-2);
            color: var(--blue-500);
        }

        /* Mobile adjustments for new components */
        @media (max-width: 768px) {
            .award-row-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .award-amount {
                margin-left: 0;
            }

            #spending-context,
            #guide-content {
                margin-left: var(--space-2);
                margin-right: var(--space-2);
            }
        }
    </style>
</head>
<body>
    <header id="navbar" class="navbar"></header>
    <main class="dashboard">
        <div class="guide-hero">
            <h2>FY 2027 Appropriations Request Guide</h2>
            <p>Use this tool to find your representative and get step-by-step instructions for filling out congressional appropriations request forms supporting NASA Science, NSF, and DOE Office of Science.</p>
        </div>
        <div id="selector-container" class="selector-section">
            <div class="selector-row">
                <div class="selector-field">
                    <label for="state-select">State</label>
                    <select id="state-select" placeholder="Select a state..."></select>
                </div>
                <div class="selector-field">
                    <label for="district-select">Representative</label>
                    <select id="district-select" placeholder="Select state first..." disabled></select>
                </div>
            </div>
        </div>
        <div id="member-header" class="member-header" style="display:none;"></div>
        <div id="spending-context" style="display:none;"></div>
        <div id="guide-content"></div>
    </main>

    <!-- Tom Select -->
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

    <!-- Dashboard Application -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
